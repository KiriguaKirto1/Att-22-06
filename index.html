<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início - Galeria do Espaço</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <header>
        <nav>
            <a href="index.html">Início</a>
            <a href="videos.html">Vídeos</a>
        </nav>
    </header>

    <main>
        <section class="cabecalho">
            <h1>Galeria do Espaço</h1>
            <p>Veja imagens sobre o espaço, a Terra e a exploração do universo.</p>
        </section>

        <section class="galeria-imagens">
            <div class="bloco-imagem">
                <img src="imagens/imagem1.jpg" alt="Imagem sobre o espaço">
            </div>

            <div class="bloco-imagem">
                <img src="imagens/imagem2.jpg" alt="Imagem da Terra vista do espaço">
            </div>

            <div class="bloco-imagem">
                <img src="imagens/imagem3.jpg" alt="Imagem de planeta no espaço">
            </div>

            <div class="bloco-imagem">
                <img src="imagens/imagem4.jpg" alt="Imagem de elementos do universo">
            </div>

            <div class="bloco-imagem">
                <img src="imagens/imagem5.jpg" alt="Imagem colorida do espaço">
            </div>

            <div class="bloco-imagem">
                <img src="imagens/imagem6.jpg" alt="Imagem sobre exploração espacial">
            </div>
        </section>
    </main>

    <footer>
        <p>Site desenvolvido na aula de Introdução ao Front-End.</p>
    </footer>
